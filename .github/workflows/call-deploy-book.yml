name: call-deploy-book

on:
  push:
    branches:
    - '**'
    # If your git repository has the Jupyter Book within some-subfolder next to
    # unrelated files, you can make this run only if a file within that specific
    # folder (or the workflow file itself) has been modified.
    #
    paths:
    - book/**
    - .github/workflows/call-deploy-book.yml
    - requirements.txt
  workflow_dispatch:

jobs: 
  update-submodules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update submodules to latest
        run: |
          git submodule update --remote
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changes-detected=false" >> $GITHUB_OUTPUT
            echo "No submodule changes detected"
          else
            echo "changes-detected=true" >> $GITHUB_OUTPUT
            echo "Submodule changes detected"
          fi
          
      - name: Create PR for submodule updates
        if: steps.changes.outputs.changes-detected == 'true'
        run: |
          # Create a new branch for submodule updates
          BRANCH_NAME="auto-update-submodules-$(date +%Y%m%d-%H%M%S)"
          git checkout -b $BRANCH_NAME
          git add .
          git commit -m "Update submodules to latest commits"
          git push origin $BRANCH_NAME
          
          # Create pull request using GitHub CLI
          gh pr create --title "🤖 Auto-update submodules" \
            --body "Automated submodule update to latest commits from upstream repositories." \
            --head $BRANCH_NAME \
            --base ${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  call-workflow:
    needs: update-submodules
    if: always()  # Run even if submodule update creates a PR
    uses: TeachBooks/deploy-book-workflow/.github/workflows/deploy-book.yml@main
    secrets: inherit
    permissions:
      contents: read
      pages: write
      id-token: write

