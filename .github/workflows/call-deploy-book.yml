name: call-deploy-book

on:
  push:
    branches:
    - '**'
    # If your git repository has the Jupyter Book within some-subfolder next to
    # unrelated files, you can make this run only if a file within that specific
    # folder (or the workflow file itself) has been modified.
    #
    paths:
    - book/**
    - .github/workflows/call-deploy-book.yml
    - requirements.txt
  workflow_dispatch:

jobs: 
  update-submodules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update submodules to latest
        run: |
          git submodule update --remote
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
      - name: Commit submodule updates
        run: |
          if git diff --quiet; then
            echo "No submodule changes to commit"
          else
            git add .
            git commit -m "Update submodules to latest commits"
            git push
          fi

  call-workflow:
    needs: update-submodules
    uses: TeachBooks/deploy-book-workflow/.github/workflows/deploy-book.yml@main
    secrets: inherit
    permissions:
      contents: read
      pages: write
      id-token: write

